name: Build, Package and Release

on:
  push:
    tags:
      - 'v*' # উদাহরণ: v1.0.0, v1.1.0 লিখে ট্যাগ পুশ করলে এই ওয়ার্কফ্লো চালু হবে

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Install Trunk
        run: cargo install trunk

      - name: Build Frontend
        working-directory: ./codedroid_frontend
        run: trunk build --release

      - name: Package dist to Zip
        run: |
          cd codedroid_frontend
          zip -r codedroid-frontend-dist.zip dist

      - name: Create GitHub Release and Upload Zip
        uses: softprops/action-gh-release@v1
        with:
          files: codedroid_frontend/codedroid-frontend-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
