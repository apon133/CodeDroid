name: Build, Package and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # এই পারমিশনটি ৪MD৩ এরর ফিক্স করবে
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Install Trunk
        run: cargo install trunk

      - name: Build Frontend
        working-directory: ./codedroid_frontend
        run: trunk build --release

      - name: Package dist to Zip
        run: |
          cd codedroid_frontend
          zip -r codedroid-frontend-dist.zip dist

      # সরাসরি ডাউনলোড অপশন যোগ করা হলো (Artifact)
      - name: Upload Artifact (Direct Download)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-zip
          path: codedroid_frontend/codedroid-frontend-dist.zip

      - name: Create GitHub Release and Upload Zip
        uses: softprops/action-gh-release@v1
        with:
          files: codedroid_frontend/codedroid-frontend-dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
