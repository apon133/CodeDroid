<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CodeDroid - A powerful web-based IDE built with Rust and Leptos">
    <title>CodeDroid IDE</title>
    <link data-trunk rel="css" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link data-trunk rel="copy-file" href="manifest.json">
    <link rel="manifest" href="manifest.json">
    <link data-trunk rel="copy-file" href="sw.js">
    <link data-trunk rel="copy-dir" href="assets">
    <link data-trunk rel="rust" data-wasm-opt="z"/>
</head>
<body>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => {
                        console.log('✅ CodeDroid SW Registered! Scope:', reg.scope);
                    })
                    .catch(err => {
                        console.error('❌ CodeDroid SW Registration failed:', err);
                    });
            });
        } else {
            console.warn('⚠️ Service Workers are not supported in this browser.');
        }

        // Drag-to-resize handler for all CodeDroid panels
        document.addEventListener('mousedown', function(e) {
            let type = '';
            if (e.target.classList.contains('sidebar-resize-gutter')) {
                type = 'sidebar';
            } else if (e.target.classList.contains('agent-resize-gutter')) {
                type = 'agent';
            } else if (e.target.classList.contains('bottom-resize-gutter')) {
                type = 'bottom';
            } else if (e.target.classList.contains('preview-resize-gutter')) {
                type = 'preview';
            }
            
            if (!type) return;
            e.preventDefault();
            
            const layout = document.querySelector('.editor-layout');
            if (!layout) return;
            
            const projectId = layout.getAttribute('data-project-id') || 'default';
            
            const startX = e.clientX;
            const startY = e.clientY;
            
            let startVal = 0;
            if (type === 'sidebar') {
                const panel = document.querySelector('.file-tree-panel.open');
                startVal = panel ? panel.getBoundingClientRect().width : 240;
            } else if (type === 'agent') {
                const panel = document.querySelector('.sidebar-panel');
                startVal = panel ? panel.getBoundingClientRect().width : 360;
            } else if (type === 'bottom') {
                const panel = document.querySelector('.bottom-panel');
                startVal = panel ? panel.getBoundingClientRect().height : 240;
            } else if (type === 'preview') {
                const panel = document.querySelector('.desktop-preview-panel');
                startVal = panel ? panel.getBoundingClientRect().width : 360;
            }
            
            // Add dragging class to body to prevent iframe/editor pointer capture
            document.body.classList.add('dragging-panel');
            if (type === 'bottom') {
                document.body.style.cursor = 'row-resize';
            } else {
                document.body.style.cursor = 'col-resize';
            }
            
            function onMouseMove(moveEvent) {
                const deltaX = moveEvent.clientX - startX;
                const deltaY = moveEvent.clientY - startY;
                
                if (type === 'sidebar') {
                    const newWidth = Math.max(150, Math.min(800, startVal + deltaX));
                    layout.style.setProperty('--sidebar-width', newWidth + 'px');
                    localStorage.setItem('codedroid_sidebar_width_' + projectId, newWidth);
                } else if (type === 'agent') {
                    const newWidth = Math.max(200, Math.min(800, startVal - deltaX));
                    layout.style.setProperty('--agent-width', newWidth + 'px');
                    localStorage.setItem('codedroid_agent_width_' + projectId, newWidth);
                } else if (type === 'bottom') {
                    const newHeight = Math.max(100, Math.min(800, startVal - deltaY));
                    layout.style.setProperty('--bottom-height', newHeight + 'px');
                    localStorage.setItem('codedroid_bottom_height_' + projectId, newHeight);
                } else if (type === 'preview') {
                    const newWidth = Math.max(200, Math.min(1200, startVal - deltaX));
                    layout.style.setProperty('--preview-width', newWidth + 'px');
                    localStorage.setItem('codedroid_preview_width_' + projectId, newWidth);
                    // Update preview panel style directly just in case it overrides
                    const panel = document.querySelector('.desktop-preview-panel');
                    if (panel) {
                        panel.style.width = newWidth + 'px';
                        panel.style.flex = 'none';
                    }
                }
            }
            
            function onMouseUp() {
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                document.body.style.cursor = 'default';
                document.body.classList.remove('dragging-panel');
            }
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
    </script>
</body>
</html>
