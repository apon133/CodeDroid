<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CodeDroid - A powerful web-based IDE built with Rust and Leptos">
    <title>CodeDroid IDE</title>
    <link data-trunk rel="css" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link data-trunk rel="copy-file" href="manifest.json">
    <link rel="manifest" href="manifest.json">
    <link data-trunk rel="copy-file" href="sw.js">
    <link data-trunk rel="copy-dir" href="assets">
    <link data-trunk rel="rust" data-wasm-opt="z"/>
</head>
<body>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => {
                        console.log('✅ CodeDroid SW Registered! Scope:', reg.scope);
                    })
                    .catch(err => {
                        console.error('❌ CodeDroid SW Registration failed:', err);
                    });
            });
        } else {
            console.warn('⚠️ Service Workers are not supported in this browser.');
        }

        // Drag-to-resize handler for Desktop Live Preview panel
        document.addEventListener('mousedown', function(e) {
            if (e.target.classList.contains('preview-resize-gutter')) {
                e.preventDefault();
                const panel = document.querySelector('.desktop-preview-panel');
                if (!panel) return;
                
                const startX = e.clientX;
                const startWidth = panel.getBoundingClientRect().width;
                
                // Add dragging class to body to prevent iframe from capturing pointer events
                document.body.classList.add('dragging-preview');
                
                function onMouseMove(moveEvent) {
                    const deltaX = moveEvent.clientX - startX;
                    // Dragging left increases size, dragging right decreases it
                    const newWidth = Math.max(250, Math.min(1000, startWidth - deltaX));
                    panel.style.width = newWidth + 'px';
                    panel.style.flex = 'none'; // Lock the flex width
                }
                
                function onMouseUp() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                    document.body.style.cursor = 'default';
                    document.body.classList.remove('dragging-preview');
                }
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                document.body.style.cursor = 'col-resize';
            }
        });
    </script>
</body>
</html>
